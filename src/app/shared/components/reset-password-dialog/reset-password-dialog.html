<h2 mat-dialog-title>Resetear contraseña</h2>
<mat-dialog-content>
    <p class="user-name">{{ data.userName }}</p>
    <form [formGroup]="form" class="form">
        <mat-form-field appearance="outline" class="w100">
            <mat-label>Nueva contraseña</mat-label>
            <mat-icon matPrefix>lock</mat-icon>
            <input matInput [type]="showPass() ? 'text' : 'password'" formControlName="password" />
            <button mat-icon-button matSuffix type="button" (click)="showPass.update(v => !v)">
                <mat-icon>{{ showPass() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            @if (form.controls.password.invalid && form.controls.password.touched) {
            <mat-error>Mínimo 6 caracteres</mat-error>
            }
        </mat-form-field>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cancelar</button>
    <button mat-flat-button color="primary" (click)="submit()" [disabled]="form.invalid">
        <mat-icon>lock_reset</mat-icon> Resetear
    </button>
</mat-dialog-actions>
