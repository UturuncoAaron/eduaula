<div class="tab-disponibilidad">

    <div class="availability-hero">
        <div class="availability-hero__icon">
            <mat-icon>event_available</mat-icon>
        </div>
        <div class="availability-hero__content">
            <h3>Horario base de atención</h3>
            <p>
                Define los bloques recurrentes que estarán disponibles cada semana. Las citas y seguimientos
                ya agendados se muestran como ocupados para esa fecha sin modificar este horario base.
            </p>
        </div>
    </div>

    @if (store.loadingAvailability()) {
    <div class="state-center">
        <mat-spinner diameter="32" />
        <span>Cargando disponibilidad…</span>
    </div>
    } @else {
    <app-availability-calendar-editor
        [initial]="availability()"
        [rule]="myRule()"
        [saving]="saving()"
        (save)="onSave($event)"
        (deleteSlot)="onDeleteSlot($event)" />
    }

</div>
