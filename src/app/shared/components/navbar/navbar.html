<header class="navbar">
    <div class="navbar-left">
        <button class="menu-btn" (click)="onToggleSidebar()"
            [matTooltip]="sidebarCollapsed() ? 'Expandir menú' : 'Contraer menú'">
            <mat-icon>menu</mat-icon>
        </button>
        <div class="app-title">
            <span class="title-main">IE JPVG</span>
            <span class="title-divider">/</span>
            <span class="title-role" [style.color]="roleColor()">
                <span class="role-dot" [style.background]="roleColor()"></span>
                {{ roleLabel() }}
            </span>
        </div>
    </div>

    <div class="navbar-right">
        <button mat-icon-button matTooltip="Notificaciones" class="icon-btn">
            <mat-icon>notifications_none</mat-icon>
            <span class="notification-badge"></span>
        </button>

        <div class="divider-vertical"></div>

        <button class="avatar-btn" [matMenuTriggerFor]="userMenu">
            <div class="avatar" [style.background]="roleColor()">
                {{ initials() }}
            </div>
            <div class="avatar-info">
                <span class="avatar-name">{{ user()?.nombre }} {{ user()?.apellido_paterno }}</span>
                <span class="avatar-role">{{ roleLabel() }}</span>
            </div>
            <mat-icon class="chevron">expand_more</mat-icon>
        </button>

        <mat-menu #userMenu="matMenu" xPosition="before" class="modern-menu">
            <div class="menu-header">
                <strong>{{ user()?.nombre }} {{ user()?.apellido_paterno }}</strong>
                <small>Usuario del sistema</small>
            </div>
            <mat-divider></mat-divider>
            <button mat-menu-item>
                <mat-icon>person_outline</mat-icon>
                <span>Mi perfil</span>
            </button>
            <button mat-menu-item>
                <mat-icon>settings</mat-icon>
                <span>Configuración</span>
            </button>
            <mat-divider></mat-divider>
            <button mat-menu-item class="logout-item" (click)="onLogout()">
                <mat-icon>logout</mat-icon>
                <span>Cerrar sesión</span>
            </button>
        </mat-menu>
    </div>
</header>
