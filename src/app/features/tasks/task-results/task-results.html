<app-page-header [title]="'Resultados · ' + (task()?.titulo ?? '...')"
    [subtitle]="task() ? (task()!.curso ?? '') + ' · ' + task()!.puntos_max + ' pts' : ''" backRoute="/tareas" />

@if (loading()) {
<div class="loading-center">
    <mat-spinner diameter="40" />
    <p>Cargando resultados...</p>
</div>
} @else if (submissions().length === 0) {
<app-empty-state icon="leaderboard" title="Aún no hay entregas" message="Ningún alumno ha respondido esta tarea todavía." />
} @else {
<mat-card class="results-card">
    <table mat-table [dataSource]="submissions()" class="w100">
        <ng-container matColumnDef="alumno">
            <th mat-header-cell *matHeaderCellDef>Alumno</th>
            <td mat-cell *matCellDef="let s">{{ nombreCompleto(s) }}</td>
        </ng-container>

        <ng-container matColumnDef="puntaje">
            <th mat-header-cell *matHeaderCellDef>Puntaje</th>
            <td mat-cell *matCellDef="let s">
                <strong>{{ nota(s) ?? '—' }}</strong>
                @if (task()) {
                <span class="max">/ {{ task()!.puntos_max }}</span>
                }
            </td>
        </ng-container>

        <ng-container matColumnDef="escala">
            <th mat-header-cell *matHeaderCellDef>Escala</th>
            <td mat-cell *matCellDef="let s">
                <app-grade-badge [nota]="nota(s)" />
            </td>
        </ng-container>

        <ng-container matColumnDef="fecha">
            <th mat-header-cell *matHeaderCellDef>Fecha</th>
            <td mat-cell *matCellDef="let s">
                {{ s.fecha_entrega | date:'dd/MM/yyyy HH:mm' }}
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="cols"></tr>
        <tr mat-row *matRowDef="let row; columns: cols;"></tr>
    </table>
</mat-card>
}
