<div class="workspace-main-container fade-in">
    <header class="workspace-header-layout">
        <app-page-header title="Reportes" subtitle="Notas, asistencia y docentes" />
    </header>

    <main class="reports-workspace">
        <mat-tab-group animationDuration="250ms" class="modern-reports-tabs" [selectedIndex]="tabActivo()"
            (selectedIndexChange)="onTabChange($event)">

            <mat-tab label="Exportar notas">
                <div class="tab-body-wrapper">
                    <app-export-grades-tab />
                </div>
            </mat-tab>

            <mat-tab label="Reporte por sección">
                <ng-template matTabContent>
                    <div class="tab-body-wrapper">
                        @defer (on viewport) {
                        <app-section-report-tab />
                        } @placeholder {
                        <div class="defer-placeholder">
                            <mat-progress-bar mode="indeterminate" />
                        </div>
                        }
                    </div>
                </ng-template>
            </mat-tab>

            <mat-tab label="Asistencia docentes">
                <ng-template matTabContent>
                    <div class="tab-body-wrapper">
                        @defer (on viewport) {
                        <app-teacher-attendance-tab />
                        } @placeholder {
                        <div class="defer-placeholder">
                            <mat-progress-bar mode="indeterminate" />
                        </div>
                        }
                    </div>
                </ng-template>
            </mat-tab>

        </mat-tab-group>
    </main>
</div>
