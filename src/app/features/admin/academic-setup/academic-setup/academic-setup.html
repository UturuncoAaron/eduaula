<div class="academic-container">

    <div class="page-header">
        <h1 class="page-title">Estructura Académica</h1>
        <p class="page-subtitle">Gestiona grados, secciones y periodos del colegio</p>
    </div>

    <mat-tab-group animationDuration="200ms" class="academic-tabs" (selectedTabChange)="onTabChange($event)">

        <!-- Tab 0: Grados y Cursos — carga inmediata -->
        <mat-tab>
            <ng-template mat-tab-label>
                <mat-icon>stairs</mat-icon>
                <span>Grados y Cursos</span>
            </ng-template>
            @if (tabVisited()[0]) {
            <app-grados-tab />
            }
        </mat-tab>

        <!-- Tab 1: Periodos — carga solo al activarse -->
        <mat-tab>
            <ng-template mat-tab-label>
                <mat-icon>calendar_month</mat-icon>
                <span>Periodos</span>
            </ng-template>
            @if (tabVisited()[1]) {
            <app-periodos-tab />
            }
        </mat-tab>

    </mat-tab-group>

</div>
