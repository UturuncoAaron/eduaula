<app-page-header title="Vincular padre con hijo" subtitle="Ingresa los documentos para crear el vínculo" />

<mat-card class="form-card">
    <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="submit()" class="form">

            <mat-form-field appearance="outline" class="w100">
                <mat-label>N° de documento del PADRE</mat-label>
                <mat-icon matPrefix>person</mat-icon>
                <input matInput formControlName="padre_doc" placeholder="DNI del padre/madre/tutor" />
                @if (form.controls.padre_doc.invalid && form.controls.padre_doc.touched) {
                <mat-error>Ingresa el documento del padre</mat-error>
                }
            </mat-form-field>

            <mat-form-field appearance="outline" class="w100">
                <mat-label>N° de documento del ALUMNO</mat-label>
                <mat-icon matPrefix>school</mat-icon>
                <input matInput formControlName="alumno_doc" placeholder="DNI del alumno" />
                @if (form.controls.alumno_doc.invalid && form.controls.alumno_doc.touched) {
                <mat-error>Ingresa el documento del alumno</mat-error>
                }
            </mat-form-field>

            <div class="actions">
                <button mat-flat-button color="primary" type="submit" [disabled]="loading()">
                    <mat-icon>link</mat-icon>
                    {{ loading() ? 'Vinculando...' : 'Crear vínculo' }}
                </button>
            </div>
        </form>
    </mat-card-content>
</mat-card>
