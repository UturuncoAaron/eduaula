<div class="container">
    <app-page-header title="Crear examen" backRoute="/examenes" />

    <mat-card class="form-card">
        <mat-card-content>
            <form [formGroup]="form" (ngSubmit)="submit()" class="form">

                <mat-form-field appearance="outline" class="w100">
                    <mat-label>Título del examen</mat-label>
                    <input matInput formControlName="titulo" />
                    @if (form.controls.titulo.invalid && form.controls.titulo.touched) {
                    <mat-error>El título es obligatorio</mat-error>
                    }
                </mat-form-field>

                <mat-form-field appearance="outline" class="w100">
                    <mat-label>Descripción (opcional)</mat-label>
                    <textarea matInput formControlName="descripcion" rows="2"></textarea>
                </mat-form-field>

                <div class="row-2">
                    <mat-form-field appearance="outline">
                        <mat-label>Fecha y hora inicio</mat-label>
                        <input matInput type="datetime-local" formControlName="fecha_inicio" />
                    </mat-form-field>
                    <mat-form-field appearance="outline">
                        <mat-label>Fecha y hora fin</mat-label>
                        <input matInput type="datetime-local" formControlName="fecha_fin" />
                    </mat-form-field>
                </div>

                <mat-form-field appearance="outline" class="w50">
                    <mat-label>Puntos totales</mat-label>
                    <input matInput type="number" formControlName="puntos_total" />
                </mat-form-field>

                <div class="actions">
                    <a mat-button routerLink="/examenes">Cancelar</a>
                    <button mat-flat-button color="primary" type="submit" [disabled]="loading()">
                        <mat-icon>save</mat-icon> Guardar examen
                    </button>
                </div>

            </form>
        </mat-card-content>
    </mat-card>
</div>
