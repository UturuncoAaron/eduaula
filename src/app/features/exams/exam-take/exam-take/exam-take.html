<app-page-header title="Rendir examen" backRoute="/examenes" />

@if (loading()) {
<p>Cargando preguntas...</p>
} @else {
<div class="progress-bar">
    <span>{{ objectKeys(answers()).length }} / {{ questions().length }} respondidas</span>
    <mat-progress-bar mode="determinate" [value]="progress" />
</div>

<div class="questions-list">
    @for (q of questions(); track q.id; let i = $index) {
    <mat-card class="question-card">
        <mat-card-content>
            <p class="question-text">
                <strong>{{ i + 1 }}.</strong> {{ q.enunciado }}
                <span class="pts">({{ q.puntos }} pt)</span>
            </p>
            <mat-radio-group [value]="answers()[q.id]" (change)="selectAnswer(q.id, $event.value)">
                @for (o of q.opciones ?? []; track o.id) {
                <mat-radio-button [value]="o.id" class="option">
                    {{ o.texto }}
                </mat-radio-button>
                }
            </mat-radio-group>
        </mat-card-content>
    </mat-card>
    }
</div>

<div class="submit-area">
    <button mat-flat-button color="primary" (click)="submit()" [disabled]="submitting()">
        {{ submitting() ? 'Enviando...' : 'Enviar examen' }}
    </button>
</div>
}
