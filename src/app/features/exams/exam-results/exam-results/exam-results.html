<app-page-header title="Resultados del examen" backRoute="/examenes" />

@if (loading()) {
<p>Cargando resultados...</p>
} @else {
<mat-card class="results-card">
    <table mat-table [dataSource]="attempts()" class="w100">

        <ng-container matColumnDef="alumno">
            <th mat-header-cell *matHeaderCellDef>Alumno</th>
            <td mat-cell *matCellDef="let r">{{ r.alumno }}</td>
        </ng-container>

        <ng-container matColumnDef="puntaje">
            <th mat-header-cell *matHeaderCellDef>Puntaje</th>
            <td mat-cell *matCellDef="let r">
                <strong>{{ r.puntaje ?? '—' }}</strong>
            </td>
        </ng-container>

        <ng-container matColumnDef="escala">
            <th mat-header-cell *matHeaderCellDef>Escala</th>
            <td mat-cell *matCellDef="let r">
                <app-grade-badge [nota]="r.puntaje" />
            </td>
        </ng-container>

        <ng-container matColumnDef="fecha">
            <th mat-header-cell *matHeaderCellDef>Fecha</th>
            <td mat-cell *matCellDef="let r">
                {{ r.fecha_inicio | slice:0:10 }}
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="cols"></tr>
        <tr mat-row *matRowDef="let row; columns: cols;"></tr>
    </table>
</mat-card>
}
