<app-page-header title="Horario semanal" subtitle="Horario de clases de tu hijo" backRoute="/portal-padres" />

@if (loading()) {
<div class="state-center">
    <mat-spinner diameter="36" />
    <p>Cargando horario...</p>
</div>
} @else if (mappedSlots().length === 0) {
<app-empty-state icon="calendar_month" title="Sin horario"
    message="No se ha configurado un horario para este alumno todavía." />
} @else {
<div class="schedule-container">
    <app-week-grid mode="schedule" [slots]="mappedSlots()" [startHour]="8" [endHour]="15" [endHourExtraMin]="30"
        [tickStepMin]="30" [pxPerMin]="2.4" [allowedDays]="['lunes', 'martes', 'miercoles', 'jueves', 'viernes']"
        [showDates]="false" [showNav]="false" />
</div>
}
