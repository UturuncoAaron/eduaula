<app-page-header
    title="Comunicados del colegio"
    subtitle="Avisos importantes para la comunidad educativa"
    backRoute="/portal-padres" />

@if (loading()) {
    <div class="state-center">
        <mat-spinner diameter="36" />
        <p>Cargando comunicados...</p>
    </div>
} @else if (visible().length === 0) {
    <app-empty-state
        icon="campaign"
        title="Sin comunicados"
        message="No hay avisos publicados en este momento." />
} @else {

    <div class="ann-list">
        @for (a of visible(); track a.id) {
            <mat-card class="ann-card">
                <mat-card-header>
                    <div mat-card-avatar class="ann-avatar"
                         [class.padres]="a.destinatario === 'padres'">
                        <mat-icon>campaign</mat-icon>
                    </div>
                    <mat-card-title>{{ a.titulo }}</mat-card-title>
                    <mat-card-subtitle>
                        <span class="dest" [class.padres]="a.destinatario === 'padres'">
                            {{ a.destinatario === 'padres' ? 'Padres' : 'General' }}
                        </span>
                        · {{ a.created_at | timeAgo }}
                    </mat-card-subtitle>
                </mat-card-header>

                <mat-card-content>
                    <p>{{ a.contenido }}</p>
                </mat-card-content>
            </mat-card>
        }
    </div>

}
