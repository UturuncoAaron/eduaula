<app-page-header title="Vista previa del informe" [subtitle]="informe()?.motivoConsultaCorto ?? 'Informe Psicológico'"
    [backRoute]="backRoute()">

    @if (informe()?.estado === 'borrador') {
    <span class="badge-toolbar badge-draft">
        <mat-icon>edit_note</mat-icon> Borrador
    </span>
    } @else if (informe()?.estado) {
    <span class="badge-toolbar badge-final">
        <mat-icon>check_circle</mat-icon> Finalizado
    </span>
    }

    <button mat-flat-button color="primary" (click)="downloadPdf()"
        [disabled]="loading() || !informe() || downloading()">
        @if (downloading()) { <mat-spinner diameter="18" /> }
        @else { <mat-icon>download</mat-icon> }
        <span>{{ downloading() ? 'Descargando…' : 'Descargar PDF' }}</span>
    </button>

</app-page-header>

@if (loading()) {
<div class="state-center">
    <mat-spinner diameter="36" />
    <p>Cargando informe...</p>
</div>
}
@else if (error()) {
<div class="state-error">
    <mat-icon>error_outline</mat-icon>
    <p>{{ error() }}</p>
</div>
}
@else if (pdfUrl()) {
<div class="pdf-wrap">
    <iframe [src]="pdfUrl()!" class="pdf-frame" title="Vista previa del informe"></iframe>
</div>
}
