<h2 mat-dialog-title>Crear foro</h2>

<mat-dialog-content>
    <form [formGroup]="form" class="form">

        <mat-form-field appearance="outline" class="w100">
            <mat-label>Título del foro</mat-label>
            <input matInput formControlName="titulo" placeholder="Ej: Dudas del capítulo 3" />
            @if (form.controls.titulo.invalid && form.controls.titulo.touched) {
            <mat-error>El título es obligatorio (mín. 3 caracteres)</mat-error>
            }
        </mat-form-field>

        <mat-form-field appearance="outline" class="w100">
            <mat-label>Descripción (opcional)</mat-label>
            <textarea matInput formControlName="descripcion" rows="3" placeholder="¿De qué trata este foro?"></textarea>
        </mat-form-field>

    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close [disabled]="loading()">Cancelar</button>
    <button mat-flat-button color="primary" (click)="submit()" [disabled]="loading()">
        <mat-icon>forum</mat-icon>
        {{ loading() ? 'Creando...' : 'Crear foro' }}
    </button>
</mat-dialog-actions>
