<app-page-header title="Foros" />

@if (loading()) {
<div class="loading-center">
    <mat-spinner diameter="40" />
</div>
} @else if (forums().length === 0) {
<app-empty-state icon="forum" title="Sin foros" message="No hay foros creados aún." />
} @else {
<div class="forums-list">
    @for (f of forums(); track f.id) {
    <mat-card class="forum-card" [routerLink]="['/foro', f.id]" [queryParams]="{ courseId: f.curso_id }">
        <mat-card-content>
            <div class="forum-row">
                <div class="forum-icon">
                    <mat-icon>forum</mat-icon>
                </div>
                <div class="forum-info">
                    <span class="forum-title">{{ f.titulo }}</span>
                    @if (f.curso_nombre) {
                    <span class="forum-course">{{ f.curso_nombre }}</span>
                    }
                    @if (f.descripcion) {
                    <span class="forum-desc">{{ f.descripcion }}</span>
                    }
                    <span class="forum-meta">
                        {{ f.created_at | date:'dd MMM yyyy' }}
                    </span>
                </div>
                <mat-icon class="arrow-icon">chevron_right</mat-icon>
            </div>
        </mat-card-content>
    </mat-card>
    }
</div>
}
