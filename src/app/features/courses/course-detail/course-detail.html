<div class="page-container">

    <header class="course-header">
        <div class="header-content">
            <button mat-icon-button class="btn-back" (click)="goBack()">
                <mat-icon>arrow_back</mat-icon>
            </button>
            <div class="header-titles">
                <div class="badge-active">Curso activo</div>
                <h1>{{ course()?.nombre ?? 'Cargando curso...' }}</h1>
                @if (course()?.descripcion) {
                <p>{{ course()!.descripcion }}</p>
                }
            </div>
        </div>
    </header>

    <main class="main-content">
        <app-tab-contenido [courseId]="courseId" [course]="course()"></app-tab-contenido>
    </main>
</div>
