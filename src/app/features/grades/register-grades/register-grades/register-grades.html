<app-page-header title="Registrar notas bimestrales" />

<div class="controls">
    <mat-form-field appearance="outline">
        <mat-label>Bimestre</mat-label>
        <mat-select [(ngModel)]="bimestre">
            <mat-option [value]="1">1er Bimestre</mat-option>
            <mat-option [value]="2">2do Bimestre</mat-option>
            <mat-option [value]="3">3er Bimestre</mat-option>
            <mat-option [value]="4">4to Bimestre</mat-option>
        </mat-select>
    </mat-form-field>
</div>

@if (loading()) {
<p>Cargando alumnos...</p>
} @else {
<mat-card class="table-card">
    <div class="table-wrapper">
        <table mat-table [dataSource]="grades()">

            <ng-container matColumnDef="alumno">
                <th mat-header-cell *matHeaderCellDef>Alumno</th>
                <td mat-cell *matCellDef="let g">{{ g.alumno }}</td>
            </ng-container>

            <ng-container matColumnDef="examenes">
                <th mat-header-cell *matHeaderCellDef>Exámenes</th>
                <td mat-cell *matCellDef="let g">
                    <input class="grade-input" type="number" min="0" max="20" [(ngModel)]="g.nota_examenes" />
                </td>
            </ng-container>

            <ng-container matColumnDef="tareas">
                <th mat-header-cell *matHeaderCellDef>Tareas</th>
                <td mat-cell *matCellDef="let g">
                    <input class="grade-input" type="number" min="0" max="20" [(ngModel)]="g.nota_tareas" />
                </td>
            </ng-container>

            <ng-container matColumnDef="participacion">
                <th mat-header-cell *matHeaderCellDef>Participación</th>
                <td mat-cell *matCellDef="let g">
                    <input class="grade-input" type="number" min="0" max="20" [(ngModel)]="g.nota_participacion" />
                </td>
            </ng-container>

            <ng-container matColumnDef="final">
                <th mat-header-cell *matHeaderCellDef>Final</th>
                <td mat-cell *matCellDef="let g">
                    <strong>{{ calcFinal(g) }}</strong>
                </td>
            </ng-container>

            <ng-container matColumnDef="escala">
                <th mat-header-cell *matHeaderCellDef>Escala</th>
                <td mat-cell *matCellDef="let g">
                    <app-grade-badge [nota]="calcFinal(g)" />
                </td>
            </ng-container>

            <ng-container matColumnDef="guardar">
                <th mat-header-cell *matHeaderCellDef></th>
                <td mat-cell *matCellDef="let g">
                    <button mat-icon-button color="primary" (click)="saveGrade(g)" title="Guardar">
                        <mat-icon>save</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="cols"></tr>
            <tr mat-row *matRowDef="let row; columns: cols;"></tr>
        </table>
    </div>
</mat-card>
}
