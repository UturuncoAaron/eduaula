<div class="layout" [class.sidebar-collapsed]="collapsed()">

    <app-sidebar [collapsed]="collapsed()" (toggleCollapse)="toggleSidebar()" />

    <div class="layout-body">
        <app-navbar [sidebarCollapsed]="collapsed()" (toggleSidebar)="toggleSidebar()" />

        <main class="page-content">
            <router-outlet />
        </main>
    </div>

    @if (!collapsed()) {
    <div class="mobile-overlay" (click)="closeSidebarOnMobile()"></div>
    }

</div>
